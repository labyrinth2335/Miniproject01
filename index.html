<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตุ่มออม | Financial Helper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="34" height="34">
            <path d="M8 16 C8 10 13 6 20 6 C27 6 32 10 32 16 L32 28 C32 31 29.5 33 27 33 L13 33 C10.5 33 8 31 8 28 Z" fill="none" stroke="currentColor" stroke-width="2.4"/>
            <path d="M8 16 L4 14 M32 16 L36 14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <line x1="8" y1="22" x2="32" y2="22" stroke="currentColor" stroke-width="2" stroke-dasharray="1 4" stroke-linecap="round"/>
          </svg>
        </span>
        <div>
          <p class="brand-title">Money saving calculator</p>
        </div>
      </div>
    </header>

    <main class="layout">

      <!-- FORM CARD -->
      <section class="card form-card">
        <h2 class="card-title">01 · Fill in your goal</h2>

        <div class="field">
          <label for="goalName">Saving goal title (optional)</label>
          <input type="text" id="goalName">
        </div>

        <div class="field">
          <label for="income">Monthly income (บาท)</label>
          <input type="number" id="income" placeholder="e.g. 15000" min="0" step="1">
        </div>

        <div class="field">
          <label for="targetAmount">Total amount of money you want to save (บาท)</label>
          <input type="number" id="targetAmount" placeholder="e.g. 12000" min="0" step="1">
        </div>

        <div class="field-row">
          <div class="field">
            <label for="periodValue">Desired saving period</label>
            <input type="number" id="periodValue" placeholder="e.g. 6" min="1" step="1">
          </div>
          <div class="field">
            <label for="periodUnit">Time unit</label>
            <select id="periodUnit">
              <option value="months">month</option>
              <option value="weeks">week</option>
              <option value="days">day</option>
            </select>
          </div>
        </div>

        <div class="btn-row">
          <button id="calcBtn" class="btn btn-primary" type="button">calculate</button>
          <button id="saveBtn" class="btn btn-secondary" type="button">save goal</button>
          <button id="clearBtn" class="btn btn-ghost" type="button">clear</button>
        </div>

        <p id="formMsg" class="form-msg" role="alert"></p>
      </section>

      <!-- RESULT CARD -->
      <section class="card result-card">
        <h2 class="card-title">02 · Result & Advice</h2>

        <div class="jar-wrap" aria-hidden="true">
          <svg id="jarSvg" viewBox="0 0 120 150" class="jar">
            <path class="jar-outline" d="M20 40 C20 22 38 12 60 12 C82 12 100 22 100 40 L100 122 C100 132 92 140 82 140 L38 140 C28 140 20 132 20 122 Z"/>
            <clipPath id="jarClip">
              <path d="M20 40 C20 22 38 12 60 12 C82 12 100 22 100 40 L100 122 C100 132 92 140 82 140 L38 140 C28 140 20 132 20 122 Z"/>
            </clipPath>
            <rect id="jarFill" x="20" y="140" width="80" height="0" clip-path="url(#jarClip)"/>
            <path class="jar-neck" d="M12 38 L108 38" stroke-linecap="round"/>
          </svg>
          <p class="jar-label" id="jarPercentLabel">—</p>
        </div>

        <div id="resultBox" class="result-box result-empty">
          <p class="result-headline" id="resultHeadline">Fill in your saving goal and press calculate to view your saving plan</p>
          <div class="result-numbers" id="resultNumbers"></div>
          <p class="result-advice" id="resultAdvice"></p>
        </div>
      </section>

      <!-- HISTORY CARD -->
      <section class="card history-card">
        <h2 class="card-title">03 · Saved goals</h2>
        <ul id="historyList" class="history-list"></ul>
        <p id="historyEmpty" class="history-empty">No saved goal</p>
      </section>

    </main>

    <footer class="foot">
      <p>Your information is saved on browser using localStorage — no data will be exported</p>
    </footer>

  </div>

<script src="app.js"></script>
</body>
</html>
